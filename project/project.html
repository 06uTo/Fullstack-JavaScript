<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header">
        <div class="container">
            <div class="header_content">
                <div class="head">
                    <div class="logo-search">
                        <img class="logo" src="img/logo.png" alt="logo">
                        <div class="logo_text">
                            BRAN<span class="selection">D</span>
                        </div>
                        <div class="search">
                            <div class="search-menu">
                                <div class="search_text">Browse</div>
                            </div>
                            <form>
                                <input class="search-window" placeholder="Search for Item..."></input>
                                <button type="submit" class="search-button"><img class="submit" src="img/search.png"
                                        alt="search"></button>
                            </form>
                        </div>
                    </div>
                    <div class="shop-account">
                        <img class="shop_logo" src="img/shop.png" alt="shop">
                        <div class="account">
                            <div class="account_text">My Account</div>
                        </div>
                    </div>
                </div>
                <div class="menu">
                    <div class="menu_paragraph">home</div>
                    <div class="menu_paragraph">man</div>
                    <div class="menu_paragraph">women</div>
                    <div class="menu_paragraph">kids</div>
                    <div class="menu_paragraph">acceseries</div>
                    <div class="menu_paragraph">featured</div>
                    <div class="menu_paragraph">hot deals</div>
                </div>
            </div>
        </div>
    </div>
    <div class="content_brand">
        <div class="container main">
            <div class="brand">
                <div class="line"></div>
                <div class="brand_text">
                    <div>THE BRAND</div>
                    <div><span class="select">OF LUXERIOUS <span class="selection">FASHION</span></span></div>
                </div>
            </div>
        </div>
    </div>
    <div class="content">
        <div class="container offers">
            <div class="content_left">
                <div class="men">
                    <div class="content_text">HOT DEAL<br> <span class="selection">FOR MEN</span></div>
                </div>
                <div class="acceseries">
                    <div class="content_text">LUXIROUS & TRENDY<br> <span class="selection">ACCESORIES</span></div>
                </div>
            </div>
            <div class="content_right">
                <div class="women">
                    <div class="content_text">30% offer<br> <span class="selection">women</span></div>
                </div>
                <div class="kids">
                    <div class="content_text">new arrivals<br> <span class="selection">FOR kids</span></div>
                </div>
            </div>
        </div>

    </div>
</body>

</html>
